<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Claude Internal</title>
<style>
/* __XTERM_CSS__ */
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a1a;
  --fg: #e0e0e0;
  --bar-bg: #252525;
  --bar-border: #333;
  --accent: #cc785c;
  --btn-bg: #333;
  --btn-hover: #444;
  --dot-ok: #4ec9b0;
  --dot-err: #f14c4c;
  --dot-wait: #cca700;
  --selection-bg: #2a2a2a;
  --selection-border: #444;
  --input-bg: #2a2a2a;
  --input-border: #444;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --fg: #1e1e1e;
    --bar-bg: #f5f5f5;
    --bar-border: #e0e0e0;
    --btn-bg: #e4e4e4;
    --btn-hover: #d0d0d0;
    --selection-bg: #f8f8f8;
    --selection-border: #e0e0e0;
    --input-bg: #f5f5f5;
    --input-border: #ddd;
  }
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  font-size: 12px;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ─── Status Bar ─── */
#bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  background: var(--bar-bg);
  border-bottom: 1px solid var(--bar-border);
  min-height: 30px;
  flex-shrink: 0;
  -webkit-user-select: none;
  user-select: none;
}

#bar-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

#dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dot-wait);
  transition: background 0.3s;
}
#dot.ok { background: var(--dot-ok); }
#dot.err { background: var(--dot-err); }
#dot.wait { background: var(--dot-wait); animation: blink 1.2s infinite; }

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#msg {
  font-size: 11px;
  opacity: 0.7;
}

#bar-right {
  display: flex;
  align-items: center;
  gap: 3px;
}

.btn {
  background: var(--btn-bg);
  border: none;
  color: var(--fg);
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 11px;
  cursor: pointer;
  line-height: 1.4;
}
.btn:hover { background: var(--btn-hover); }

/* ─── Selection Bar ─── */
#selection-bar {
  display: none;
  padding: 6px 10px;
  background: var(--selection-bg);
  border-bottom: 1px solid var(--selection-border);
  font-size: 11px;
  flex-shrink: 0;
  overflow: hidden;
}
#selection-bar.visible { display: flex; align-items: center; gap: 6px; }
#selection-bar .sel-icon { opacity: 0.5; font-size: 12px; }
#selection-bar .sel-text { opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
#selection-bar .sel-badge {
  background: var(--accent);
  color: #fff;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  white-space: nowrap;
}

/* ─── Terminal Area ─── */
#term-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}

#term-wrap .xterm {
  height: 100%;
  padding: 4px;
}

/* ─── Context Input ─── */
#context-input-wrap {
  display: none;
  padding: 8px 10px;
  background: var(--bar-bg);
  border-top: 1px solid var(--bar-border);
  flex-shrink: 0;
  gap: 6px;
  align-items: center;
}
#context-input-wrap.visible { display: flex; }

#context-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  padding: 6px 10px;
  color: var(--fg);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  resize: none;
}
#context-input:focus { border-color: var(--accent); }
#context-input::placeholder { opacity: 0.4; }

#btn-send {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
#btn-send:hover { opacity: 0.9; }

/* ─── Offline Screen ─── */
#offline {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--bg);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 12px;
  padding: 24px;
}
#offline.show { display: flex; }
#offline h2 { font-size: 14px; font-weight: 600; }
#offline p { font-size: 12px; opacity: 0.6; line-height: 1.5; max-width: 260px; }
#offline code {
  display: block;
  background: var(--btn-bg);
  padding: 6px 12px;
  border-radius: 4px;
  font-family: Menlo, monospace;
  font-size: 11px;
  margin-top: 4px;
}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <div id="bar-left">
      <div id="dot" class="wait"></div>
      <span id="msg">Connecting...</span>
    </div>
    <div id="bar-right">
      <button class="btn" id="btn-smaller">A−</button>
      <button class="btn" id="btn-bigger">A+</button>
      <button class="btn" id="btn-reconnect">Reconnect</button>
    </div>
  </div>
  <div id="selection-bar">
    <span class="sel-icon">◆</span>
    <span class="sel-text" id="sel-text">No selection</span>
    <span class="sel-badge" id="sel-badge"></span>
  </div>
  <div id="term-wrap">
    <div id="terminal"></div>
  </div>
  <div id="context-input-wrap">
    <input type="text" id="context-input" placeholder="Ask about selected layers..." />
    <button id="btn-send">Send</button>
  </div>
  <div id="offline">
    <h2>Bridge Server Offline</h2>
    <p>Start the bridge first, then click Reconnect:</p>
    <code>npm start</code>
  </div>
</div>

<script>
/* __XTERM_JS__ */
</script>
<script>
/* __FIT_ADDON_JS__ */
</script>
<script>
(function() {
  'use strict';

  // ─── Config ───────────────────────────────────────
  var HOST = 'http://localhost:9528';
  var POLL_MS = 80;
  var MAX_ERRORS = 5;

  // ─── State ────────────────────────────────────────
  var term = null;
  var fitAddon = null;
  var polling = false;
  var clientId = 'figma-' + Math.random().toString(36).slice(2, 10);
  var authToken = null;
  var offset = 0;
  var errors = 0;
  var fontSize = 13;

  // Selection state
  var currentSelection = [];

  // ─── DOM ──────────────────────────────────────────
  var $dot = document.getElementById('dot');
  var $msg = document.getElementById('msg');
  var $offline = document.getElementById('offline');
  var $termEl = document.getElementById('terminal');
  var $selBar = document.getElementById('selection-bar');
  var $selText = document.getElementById('sel-text');
  var $selBadge = document.getElementById('sel-badge');
  var $ctxWrap = document.getElementById('context-input-wrap');
  var $ctxInput = document.getElementById('context-input');
  var $btnSend = document.getElementById('btn-send');

  // ─── Helpers ──────────────────────────────────────
  function headers(extra) {
    var h = Object.assign({}, extra || {});
    h['X-Client-Id'] = clientId;
    if (authToken) h['X-Auth-Token'] = authToken;
    return h;
  }

  function status(state, text) {
    $dot.className = state;
    $msg.textContent = text;
    if (state === 'err') {
      $offline.classList.add('show');
    } else {
      $offline.classList.remove('show');
    }
  }

  // ─── Selection Handling ───────────────────────────
  var currentFileKey = '';

  function updateSelection(data) {
    var nodes = data.nodes || [];
    currentSelection = nodes;
    currentFileKey = data.fileKey || '';

    if (currentSelection.length === 0) {
      $selBar.classList.remove('visible');
      $ctxWrap.classList.remove('visible');
    } else {
      $selBar.classList.add('visible');
      $ctxWrap.classList.add('visible');

      if (currentSelection.length === 1) {
        var n = currentSelection[0];
        $selText.textContent = n.name + ' (' + n.type + ', ' + n.width + '×' + n.height + ')';
        $selBadge.textContent = '1 layer';
      } else {
        var names = currentSelection.slice(0, 3).map(function(n) { return n.name; }).join(', ');
        if (currentSelection.length > 3) names += '...';
        $selText.textContent = names;
        $selBadge.textContent = currentSelection.length + ' layers';
      }
    }
  }

  function buildMCPPrompt(question) {
    var prompt = '';
    var node = currentSelection[0];

    if (node.figmaUrl) {
      prompt += '请通过 Figma MCP 打开下面的 Figma 链接获取设计上下文，然后回答我的问题。\n\n';
      if (currentSelection.length === 1) {
        prompt += 'Figma 链接: ' + node.figmaUrl + '\n';
      } else {
        prompt += 'Figma 链接:\n';
        for (var i = 0; i < currentSelection.length; i++) {
          var n = currentSelection[i];
          if (n.figmaUrl) prompt += '- ' + n.figmaUrl + '\n';
        }
      }
      prompt += '\n我的问题: ' + question;
    } else if (currentFileKey) {
      // 有 fileKey 但没构建出 URL（不太可能）
      prompt += '请通过 Figma MCP 的 get_design_context 工具获取设计上下文。\n';
      prompt += 'fileKey: ' + currentFileKey + '\n';
      prompt += 'nodeId: "' + node.id + '"\n\n';
      prompt += '我的问题: ' + question;
    } else {
      // 没有 fileKey，让用户提供链接
      prompt += '我在 Figma 中选中了图层 "' + node.name + '" (' + node.type + ', ' + node.width + '×' + node.height + ')\n';
      prompt += '但无法自动获取文件链接。请从 Figma 地址栏复制当前文件的链接给我，我就能通过 MCP 获取完整设计上下文。\n\n';
      prompt += '我的问题: ' + question;
    }

    return prompt;
  }

  function sendContextQuestion() {
    var question = $ctxInput.value.trim();
    if (!question || currentSelection.length === 0) return;

    var fullPrompt = buildMCPPrompt(question);

    if (proc_alive()) {
      sendPromptToTerminal(fullPrompt);
    }

    $ctxInput.value = '';
    if (term) term.focus();
  }

  function proc_alive() {
    return polling && term;
  }

  function sendToTerminal(text) {
    fetch(HOST + '/input', {
      method: 'POST',
      headers: headers({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ data: text }),
    }).catch(function() {});
  }

  function sendPromptToTerminal(prompt) {
    var pastedPrompt = prompt.replace(/\r\n/g, '\n').replace(/\n/g, '\r');
    sendToTerminal('\x1b[200~' + pastedPrompt + '\x1b[201~');
    setTimeout(function() {
      sendToTerminal('\r');
    }, 120);
  }

  // ─── Terminal Init ────────────────────────────────
  function initTerminal() {
    if (term) return;

    var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = isDark
      ? { background: '#1a1a1a', foreground: '#e0e0e0', cursor: '#e0e0e0', selectionBackground: '#cc785c55' }
      : { background: '#ffffff', foreground: '#1e1e1e', cursor: '#1e1e1e', selectionBackground: '#cc785c33' };

    term = new Terminal({
      fontSize: fontSize,
      fontFamily: 'Menlo, Monaco, "SF Mono", "Courier New", monospace',
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'bar',
      allowProposedApi: true,
      scrollback: 5000,
      theme: theme,
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open($termEl);
    fitAddon.fit();

    // User input → bridge
    term.onData(function(data) {
      fetch(HOST + '/input', {
        method: 'POST',
        headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ data: data }),
      }).catch(function() {});
    });

    // Auto-resize
    var ro = new ResizeObserver(function() {
      if (fitAddon) {
        fitAddon.fit();
        fetch(HOST + '/resize', {
          method: 'POST',
          headers: headers({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ cols: term.cols, rows: term.rows }),
        }).catch(function() {});
      }
    });
    ro.observe($termEl);
  }

  // ─── Poll Loop ────────────────────────────────────
  function poll() {
    if (!polling) return;

    fetch(HOST + '/output?since=' + offset, { headers: headers() })
      .then(function(res) {
        if (!res.ok) throw new Error(res.status);
        return res.json();
      })
      .then(function(data) {
        if (typeof data.nextOffset === 'number') offset = data.nextOffset;
        var chunks = data.chunks || [];
        for (var i = 0; i < chunks.length; i++) {
          term.write(chunks[i]);
        }
        errors = 0;
        status('ok', 'Connected');
      })
      .catch(function() {
        errors++;
        if (errors >= MAX_ERRORS) {
          status('err', 'Connection lost');
          polling = false;
          return;
        }
      })
      .finally(function() {
        if (polling) setTimeout(poll, POLL_MS);
      });
  }

  // ─── Connect ──────────────────────────────────────
  function connect() {
    if (polling) return;
    errors = 0;
    offset = 0;
    status('wait', 'Connecting...');

    fetch(HOST + '/health')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.token) authToken = data.token;
        polling = true;
        initTerminal();
        term.clear();
        term.focus();
        // Send initial resize
        fetch(HOST + '/resize', {
          method: 'POST',
          headers: headers({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ cols: term.cols, rows: term.rows }),
        }).catch(function() {});
        poll();
      })
      .catch(function() {
        status('err', 'Bridge offline');
      });
  }

  // ─── Button Handlers ──────────────────────────────
  document.getElementById('btn-reconnect').onclick = connect;

  document.getElementById('btn-smaller').onclick = function() {
    fontSize = Math.max(10, fontSize - 1);
    if (term) { term.options.fontSize = fontSize; fitAddon.fit(); }
  };

  document.getElementById('btn-bigger').onclick = function() {
    fontSize = Math.min(20, fontSize + 1);
    if (term) { term.options.fontSize = fontSize; fitAddon.fit(); }
  };

  // Send context question
  $btnSend.onclick = sendContextQuestion;
  $ctxInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendContextQuestion();
    }
  });

  // ─── Figma Plugin Messages ────────────────────────
  window.onmessage = function(event) {
    var msg = event.data && event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'selection') {
      updateSelection(msg);
    }
  };

  // ─── Cleanup ──────────────────────────────────────
  window.addEventListener('beforeunload', function() {
    polling = false;
    fetch(HOST + '/disconnect', {
      method: 'POST',
      headers: headers({ 'Content-Type': 'application/json' }),
      body: '{}',
      keepalive: true,
    }).catch(function() {});
  });

  // ─── Auto-connect ─────────────────────────────────
  connect();

})();
</script>
</body>
</html>
